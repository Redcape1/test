<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Profile Card</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Oxanium:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0e17;
    --bg-card: #111827;
    --bg-card-alt: #0f1522;
    --bg-section: #1a2236;
    --bg-bar: #1e293b;
    --border: #1e3a5f;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --text-dim: #64748b;
    --accent-blue: #3b82f6;
    --accent-cyan: #06b6d4;
    --accent-green: #22c55e;
    --accent-lime: #84cc16;
    --accent-yellow: #eab308;
    --accent-orange: #f97316;
    --accent-red: #ef4444;
    --accent-purple: #a855f7;
    --accent-pink: #ec4899;
    --gold: #fbbf24;
    --platinum: #a5b4fc;
    --diamond: #67e8f9;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    padding: 24px;
  }
  .profile-container { max-width: 1400px; margin: 0 auto; }
  .loading-screen {
    display: flex; align-items: center; justify-content: center;
    height: 60vh; flex-direction: column; gap: 16px;
  }
  .loading-spinner {
    width: 48px; height: 48px;
    border: 3px solid var(--bg-section);
    border-top-color: var(--accent-cyan);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-family: 'Oxanium', sans-serif;
    color: var(--text-dim); font-size: 14px;
    letter-spacing: 2px; text-transform: uppercase;
  }
  .no-user {
    display: flex; align-items: center; justify-content: center;
    height: 60vh; flex-direction: column; gap: 12px;
  }
  .no-user-icon { font-size: 48px; }
  .no-user-text { font-family: 'Oxanium', sans-serif; color: var(--text-dim); font-size: 16px; }
  .search-box { margin-top: 16px; display: flex; gap: 8px; }
  .search-input {
    background: #1a2236; border: 1px solid #1e3a5f; color: #e2e8f0;
    padding: 10px 16px; border-radius: 8px; font-family: 'Oxanium', sans-serif;
    font-size: 16px; width: 200px; outline: none;
  }
  .search-input:focus { border-color: var(--accent-cyan); box-shadow: 0 0 8px rgba(6,182,212,0.2); }
  .search-btn {
    background: var(--accent-blue); color: white; border: none;
    padding: 10px 20px; border-radius: 8px; font-family: 'Oxanium', sans-serif;
    font-size: 14px; cursor: pointer; letter-spacing: 1px; text-transform: uppercase;
  }
  .search-btn:hover { background: #2563eb; }
  .back-btn {
    position: fixed; top: 16px; left: 16px; background: var(--bg-section);
    border: 1px solid var(--border); color: var(--text-secondary); padding: 8px 16px;
    border-radius: 8px; font-family: 'Oxanium', sans-serif; font-size: 12px;
    cursor: pointer; letter-spacing: 1px; text-transform: uppercase; z-index: 100;
    display: none;
  }
  .back-btn:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }
  .header {
    background: linear-gradient(135deg, #0f1a2e 0%, #1a1040 50%, #0f1a2e 100%);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 24px 32px; display: flex; align-items: center;
    gap: 28px; position: relative; overflow: hidden; margin-bottom: 16px;
  }
  .header::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple), var(--accent-cyan));
  }
  .avatar {
    width: 90px; height: 90px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Oxanium', sans-serif; font-size: 32px; font-weight: 700;
    color: white; flex-shrink: 0; box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
  }
  .header-info { flex: 1; }
  .user-name { font-family: 'Oxanium', sans-serif; font-size: 28px; font-weight: 700; color: white; letter-spacing: 1px; }
  .user-id-text { font-size: 14px; color: var(--text-dim); margin-top: 2px; font-family: 'Oxanium', sans-serif; }
  .user-meta { display: flex; gap: 24px; margin-top: 10px; }
  .meta-item { display: flex; align-items: center; gap: 6px; font-size: 14px; color: var(--text-secondary); }
  .meta-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .header-badges { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
  .vip-badge {
    background: linear-gradient(135deg, #312e81, #4c1d95);
    border: 1px solid var(--accent-purple); padding: 6px 18px; border-radius: 20px;
    font-family: 'Oxanium', sans-serif; font-size: 13px; font-weight: 600;
    color: var(--platinum); letter-spacing: 2px; text-transform: uppercase;
  }
  .overall-score {
    background: var(--bg-section); border: 2px solid var(--accent-cyan);
    border-radius: 12px; padding: 8px 20px; text-align: center;
    box-shadow: 0 0 15px rgba(6, 182, 212, 0.15);
  }
  .overall-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; }
  .overall-value { font-family: 'Oxanium', sans-serif; font-size: 36px; font-weight: 700; color: var(--accent-cyan); line-height: 1; }
  .main-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .section { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .section-header {
    background: var(--bg-section); padding: 10px 16px;
    font-family: 'Oxanium', sans-serif; font-size: 13px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 2px;
    display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border);
  }
  .section-body { padding: 12px 16px; }
  .stat-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { font-size: 13px; color: var(--text-secondary); flex: 1; }
  .stat-value { font-family: 'Oxanium', sans-serif; font-size: 15px; font-weight: 600; min-width: 50px; text-align: right; }
  .stat-bar-container { width: 80px; height: 6px; background: var(--bg-bar); border-radius: 3px; margin-left: 10px; overflow: hidden; }
  .stat-bar { height: 100%; border-radius: 3px; transition: width 1s ease; }
  .stat-link { text-decoration: none; display: block; border-radius: 6px; margin: -2px -4px; padding: 2px 4px; transition: background 0.2s; }
  .stat-link:hover { background: rgba(59,130,246,0.08); }
  .stat-link:hover .stat-label { color: var(--accent-cyan); }
  .stat-link .drill-icon { font-size: 11px; margin-left: 4px; opacity: 0; transition: opacity 0.2s; }
  .stat-link:hover .drill-icon { opacity: 1; }
  .mini-link { text-decoration: none; display: block; border-radius: 10px; transition: transform 0.2s, box-shadow 0.2s; }
  .mini-link:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(59,130,246,0.2); }
  .val-elite { color: var(--accent-cyan); }
  .val-high { color: var(--accent-green); }
  .val-good { color: var(--accent-lime); }
  .val-mid { color: var(--accent-yellow); }
  .val-low { color: var(--accent-orange); }
  .val-critical { color: var(--accent-red); }
  .bar-elite { background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue)); }
  .bar-high { background: linear-gradient(90deg, var(--accent-green), var(--accent-cyan)); }
  .bar-good { background: linear-gradient(90deg, var(--accent-lime), var(--accent-green)); }
  .bar-mid { background: linear-gradient(90deg, var(--accent-yellow), var(--accent-lime)); }
  .bar-low { background: linear-gradient(90deg, var(--accent-orange), var(--accent-yellow)); }
  .bar-critical { background: linear-gradient(90deg, var(--accent-red), var(--accent-orange)); }
  .segment-grid { display: flex; flex-direction: column; gap: 8px; }
  .segment-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; background: var(--bg-card-alt); border-radius: 8px; border-left: 3px solid var(--accent-blue);
  }
  .segment-name { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 12px;
    font-family: 'Oxanium', sans-serif; font-size: 11px; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase;
  }
  .badge-platinum { background: rgba(165,180,252,0.15); color: var(--platinum); border: 1px solid rgba(165,180,252,0.3); }
  .badge-gold { background: rgba(251,191,36,0.12); color: var(--gold); border: 1px solid rgba(251,191,36,0.3); }
  .badge-black { background: rgba(255,255,255,0.08); color: #e2e8f0; border: 1px solid rgba(255,255,255,0.2); }
  .badge-iron { background: rgba(148,163,184,0.12); color: var(--text-secondary); border: 1px solid rgba(148,163,184,0.2); }
  .badge-bronze { background: rgba(217,119,6,0.12); color: #f59e0b; border: 1px solid rgba(217,119,6,0.2); }
  .badge-copper { background: rgba(234,88,12,0.12); color: var(--accent-orange); border: 1px solid rgba(234,88,12,0.2); }
  .badge-steel { background: rgba(100,116,139,0.15); color: #94a3b8; border: 1px solid rgba(100,116,139,0.3); }
  .badge-active { background: rgba(34,197,94,0.12); color: var(--accent-green); border: 1px solid rgba(34,197,94,0.3); }
  .badge-warning { background: rgba(234,179,8,0.12); color: var(--accent-yellow); border: 1px solid rgba(234,179,8,0.3); }
  .badge-danger { background: rgba(239,68,68,0.12); color: var(--accent-red); border: 1px solid rgba(239,68,68,0.3); }
  .badge-none { background: rgba(100,116,139,0.1); color: var(--text-dim); border: 1px solid rgba(100,116,139,0.2); }
  .bottom-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 16px; }
  .mini-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; text-align: center; position: relative; overflow: hidden;
  }
  .mini-card::before { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; }
  .mini-card.mc-green::before { background: var(--accent-green); }
  .mini-card.mc-blue::before { background: var(--accent-blue); }
  .mini-card.mc-yellow::before { background: var(--accent-yellow); }
  .mini-card.mc-red::before { background: var(--accent-red); }
  .mini-card.mc-purple::before { background: var(--accent-purple); }
  .mini-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px; }
  .mini-value { font-family: 'Oxanium', sans-serif; font-size: 26px; font-weight: 700; }
  .mini-sub { font-size: 12px; margin-top: 4px; }
  .trend-up { color: var(--accent-green); }
  .trend-down { color: var(--accent-red); }
  .trend-flat { color: var(--text-dim); }
  .lifecycle-bar {
    display: flex; align-items: center; gap: 0; padding: 16px;
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 16px;
  }
  .lc-stage {
    flex: 1; text-align: center; padding: 12px 8px; border-radius: 8px;
    font-family: 'Oxanium', sans-serif; font-size: 13px; font-weight: 500;
    color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase;
  }
  .lc-stage.active {
    background: linear-gradient(135deg, rgba(6,182,212,0.15), rgba(59,130,246,0.15));
    color: var(--accent-cyan); border: 1px solid rgba(6,182,212,0.3);
  }
  .lc-stage.completed { color: var(--accent-green); }
  .lc-arrow { color: var(--text-dim); font-size: 18px; padding: 0 4px; }
  .risk-banner { padding: 14px 20px; border-radius: 10px; display: flex; align-items: center; gap: 12px; font-size: 14px; }
  .risk-low { background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.2); color: var(--accent-green); }
  .risk-medium { background: rgba(234,179,8,0.08); border: 1px solid rgba(234,179,8,0.2); color: var(--accent-yellow); }
  .risk-high { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); color: var(--accent-red); }
  .risk-icon { font-size: 22px; }
  .risk-text { flex: 1; }
  .risk-label { font-family: 'Oxanium', sans-serif; font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
  .risk-desc { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
  @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .header { animation: fadeSlideIn 0.5s ease forwards; }
  .main-grid { animation: fadeSlideIn 0.5s ease 0.1s forwards; opacity: 0; }
  .bottom-row { animation: fadeSlideIn 0.5s ease 0.2s forwards; opacity: 0; }
  .lifecycle-bar { animation: fadeSlideIn 0.5s ease 0.3s forwards; opacity: 0; }
  .risk-banner { animation: fadeSlideIn 0.5s ease 0.4s forwards; opacity: 0; }
</style>
</head>
<body>
<button class="back-btn" id="backBtn" onclick="goBack()">&larr; New Search</button>
<div class="profile-container" id="app">
  <div class="loading-screen" id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading User Profile...</div>
  </div>
  <div class="no-user" id="no-user" style="display:none">
    <div class="no-user-icon">&#x1F464;</div>
    <div class="no-user-text" id="noUserText">Enter a User ID</div>
    <div class="search-box">
      <input id="searchInput" type="text" class="search-input" placeholder="User ID...">
      <button onclick="loadUser()" class="search-btn">Load</button>
    </div>
  </div>
  <div id="profile-content" style="display:none">
    <div class="header">
      <div class="avatar" id="avatar">--</div>
      <div class="header-info">
        <div class="user-name" id="userName">--</div>
        <div class="user-id-text" id="userIdText">--</div>
        <div class="user-meta" id="userMeta"></div>
      </div>
      <div class="header-badges">
        <div class="vip-badge" id="vipBadge">--</div>
        <div class="overall-score">
          <div class="overall-label">Score</div>
          <div class="overall-value" id="overallScore">--</div>
        </div>
      </div>
    </div>
    <div class="main-grid">
      <div class="section">
        <div class="section-header"><span class="icon">&#x25C6;</span> Segments</div>
        <div class="section-body"><div class="segment-grid" id="segmentsGrid"></div></div>
      </div>
      <div class="section">
        <div class="section-header"><span class="icon">&#x25B2;</span> Activity</div>
        <div class="section-body" id="activityBody"></div>
      </div>
      <div class="section">
        <div class="section-header"><span class="icon">&#x25CF;</span> Financial</div>
        <div class="section-body" id="financialBody"></div>
      </div>
    </div>
    <div class="bottom-row" id="bottomRow"></div>
    <div class="lifecycle-bar" id="lifecycleBar"></div>
    <div id="riskBanner"></div>
  </div>
</div>
<script>
var WORKER_URL = 'https://summer-cake-3a94.emrence.workers.dev';

// ============================================================
// DRILL URLs — add more as needed, use USER_ID placeholder
// ============================================================
var DRILLS = {
  volume: 'https://levex.omniapp.co/e/2:hNqjmbHk/2?isFromDashboardDrill=true&miniUuid=9uiJCGd2&f--users.user_id=USER_ID'
  // deposit: 'https://levex.omniapp.co/e/WORKBOOK_ID?f--users.user_id=USER_ID',
  // bonus: 'https://levex.omniapp.co/e/WORKBOOK_ID?f--users.user_id=USER_ID',
  // pnl: 'https://levex.omniapp.co/e/WORKBOOK_ID?f--users.user_id=USER_ID',
};

function drillUrl(key, userId) {
  if (!DRILLS[key]) return null;
  return DRILLS[key].replace(/USER_ID/g, userId);
}

function getUserIdFromUrl() {
  return new URLSearchParams(window.location.search).get('user_id');
}

function loadUser() {
  var id = document.getElementById('searchInput').value.trim();
  if (id) {
    var url = new URL(window.location);
    url.searchParams.set('user_id', id);
    window.history.replaceState({}, '', url);
    document.getElementById('no-user').style.display = 'none';
    document.getElementById('loading').style.display = 'flex';
    document.getElementById('profile-content').style.display = 'none';
    init();
  }
}

function goBack() {
  document.getElementById('profile-content').style.display = 'none';
  document.getElementById('loading').style.display = 'none';
  document.getElementById('backBtn').style.display = 'none';
  document.getElementById('no-user').style.display = 'flex';
  document.getElementById('noUserText').textContent = 'Enter a User ID';
  document.getElementById('searchInput').value = '';
  document.getElementById('searchInput').focus();
  var url = new URL(window.location);
  url.searchParams.delete('user_id');
  window.history.replaceState({}, '', url);
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.activeElement.id === 'searchInput') loadUser();
});

async function fetchUserData(userId) {
  try {
    var resp = await fetch(WORKER_URL + '?user_id=' + userId);
    if (resp.ok) {
      var data = await resp.json();
      if (!data.error) return data;
    }
  } catch(e) {
    console.warn('API failed:', e);
  }
  return null;
}

function formatCurrency(val) {
  if (Math.abs(val) >= 1000000) return (val < 0 ? '-' : '') + '$' + (Math.abs(val)/1000000).toFixed(1) + 'M';
  if (Math.abs(val) >= 1000) return (val < 0 ? '-' : '') + '$' + (Math.abs(val)/1000).toFixed(1) + 'K';
  return (val < 0 ? '-' : '') + '$' + Math.abs(val).toFixed(val % 1 !== 0 ? 2 : 0);
}

function getValueClass(pct) {
  if (pct >= 90) return 'elite';
  if (pct >= 75) return 'high';
  if (pct >= 60) return 'good';
  if (pct >= 40) return 'mid';
  if (pct >= 20) return 'low';
  return 'critical';
}

function getBadgeClass(value) {
  var v = (value || '').toLowerCase();
  if (['platinum', 'high value', 'diamond', 'platinium'].indexOf(v) >= 0) return 'badge-platinum';
  if (v === 'gold') return 'badge-gold';
  if (v === 'black') return 'badge-black';
  if (v === 'iron') return 'badge-iron';
  if (v === 'bronze') return 'badge-bronze';
  if (v === 'copper' || v === 'tier 2') return 'badge-copper';
  if (v === 'steel') return 'badge-steel';
  if (['recently active', 'active', 'loyal', 'positive', 'medium'].indexOf(v) >= 0) return 'badge-active';
  if (['at risk', 'at-risk', 'declining', 'cooling off', 'high-risk'].indexOf(v) >= 0) return 'badge-warning';
  if (['negative', 'churned', 'inactive', 'dormant'].indexOf(v) >= 0) return 'badge-danger';
  return 'badge-none';
}

function getBorderColor(value) {
  var cls = getBadgeClass(value);
  var map = {
    'badge-platinum': 'var(--platinum)', 'badge-gold': 'var(--gold)', 'badge-black': '#e2e8f0',
    'badge-iron': 'var(--text-secondary)', 'badge-bronze': '#f59e0b', 'badge-copper': 'var(--accent-orange)',
    'badge-steel': '#94a3b8', 'badge-active': 'var(--accent-green)', 'badge-warning': 'var(--accent-yellow)',
    'badge-danger': 'var(--accent-red)', 'badge-none': 'var(--text-dim)'
  };
  return map[cls] || 'var(--accent-blue)';
}

function calcOverallScore(data) {
  var score = 50;
  var loy = (data.segments.loyalty || '').toLowerCase();
  if (loy === 'black' || loy === 'diamond') score += 20;
  else if (loy === 'platinum' || loy === 'platinium') score += 15;
  else if (loy === 'gold') score += 10;
  else if (loy === 'silver') score += 7;
  else if (loy === 'bronze') score += 5;
  if (data.activity.trade_count_30d > 50) score += 10;
  else if (data.activity.trade_count_30d > 20) score += 5;
  if (data.financial.pnl_all_time < -1000) score -= 10;
  if (data.financial.pnl_all_time > 0) score += 5;
  if (data.activity.trade_volume_30d > 1000000) score += 8;
  return Math.max(10, Math.min(99, score));
}

function statRow(label, value, pct, link) {
  var cls = getValueClass(pct);
  var inner = '<div class="stat-row"><span class="stat-label">' + label + (link ? ' <span class="drill-icon">&#x2197;</span>' : '') + '</span><span class="stat-value val-' + cls + '">' + value + '</span><div class="stat-bar-container"><div class="stat-bar bar-' + cls + '" style="width:' + pct + '%"></div></div></div>';
  if (link) return '<a href="' + link + '" target="_blank" class="stat-link">' + inner + '</a>';
  return inner;
}

function segmentItem(name, value) {
  return '<div class="segment-item" style="border-color:' + getBorderColor(value) + '"><span class="segment-name">'
